<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jam Maker +</title>
<style>
  :root{
    /* Couleurs de l'app pilotees par le contrat de theme du portail (--fm-*) */
    --bg:var(--fm-bg); --panel:var(--fm-panel); --panel2:var(--fm-panel-2); --line:var(--fm-line);
    --txt:var(--fm-ink); --mut:var(--fm-sub); --acc:var(--fm-accent); --acc2:var(--fm-accent-2);
    --rouge:#e06060; --orange:#e0a050; --vert:#5ec8a0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--fm-font-ui);background:var(--bg);color:var(--txt);line-height:1.45}
  header{display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap;position:sticky;top:0;z-index:5}
  header h1{font-size:1.15rem;margin:0;color:var(--acc);white-space:nowrap}
  nav{display:flex;gap:4px;flex-wrap:wrap}
  nav a{color:var(--mut);text-decoration:none;padding:6px 10px;border-radius:8px;font-size:.92rem}
  nav a.actif{background:var(--panel2);color:var(--txt)}
  #zone-user{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--mut)}
  main{max-width:960px;margin:0 auto;padding:18px}
  h2{font-size:1.25rem;margin:.2em 0 .6em}
  h3{font-size:1.02rem;margin:1em 0 .4em;color:var(--acc)}
  .carte{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px}
  .carte.clic{cursor:pointer}
  .carte.clic:hover{border-color:var(--acc)}
  .ligne{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .esp{margin-left:auto}
  .mut{color:var(--mut);font-size:.86rem}
  .chip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:2px 10px;font-size:.8rem;margin:2px}
  .chip.acc{border-color:var(--acc);color:var(--acc)}
  .chip.vert{border-color:var(--vert);color:var(--vert)}
  .chip.orange{border-color:var(--orange);color:var(--orange)}
  .chip.rouge{border-color:var(--rouge);color:var(--rouge)}
  .pill{font-size:.78rem;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
  button,select,input,textarea{font:inherit;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  button{cursor:pointer}
  button.prim{background:var(--acc);border-color:var(--acc);color:var(--fm-accent-ink);font-weight:600}
  button.mini{font-size:.8rem;padding:3px 9px}
  form.bloc{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0}
  .jauge{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;flex:1;min-width:80px}
  .jauge>div{height:100%;background:var(--acc2);transition:width .3s}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  td,th{padding:6px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{color:var(--mut);font-weight:500;font-size:.8rem}
  .bandeau-demo{background:var(--panel2);color:var(--acc);font-size:.82rem;padding:6px 18px;text-align:center}
  a{color:var(--acc2)}
  .vide{color:var(--mut);font-style:italic;font-size:.9rem}
  /* Badges d'instruments */
  .badge{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px 11px 3px 4px;font-size:.82rem;margin:2px;vertical-align:middle}
  .badge .ico{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;flex:none}
  .badge.gros{font-size:.95rem;padding:5px 14px 5px 6px}
  .badge.gros .ico{width:28px;height:28px}
  /* Conseils contextualisés */
  .conseil{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin:6px 0;font-size:.9rem;flex-wrap:wrap}
  .conseil .amp{font-size:1.05rem}
  /* Mode guidé */
  .guide{max-width:580px;margin:0 auto;text-align:center}
  .guide h2{font-size:1.45rem}
  .guide p{font-size:1.02rem}
  .guide .etapes{display:flex;justify-content:center;gap:8px;margin:14px 0}
  .guide .etapes span{width:10px;height:10px;border-radius:50%;background:var(--panel2);border:1px solid var(--line)}
  .guide .etapes span.fait{background:var(--acc);border-color:var(--acc)}
  .gbtn{display:block;width:100%;text-align:left;font-size:1.05rem;padding:14px 18px;margin:10px 0;border-radius:12px;background:var(--panel);border:1px solid var(--line)}
  .gbtn:hover{border-color:var(--acc)}
  .gbtn small{display:block;color:var(--mut);font-size:.85rem;margin-top:2px;font-weight:400}
  .choix-instr{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
  .choix-instr button{border-radius:999px;display:inline-flex;align-items:center;gap:6px;font-size:.95rem;padding:8px 14px}
  .choix-instr button.on{border-color:var(--acc);background:var(--panel2);color:var(--acc)}
  /* Dépôt de partitions */
  .dropzone{border:2px dashed var(--line);border-radius:14px;padding:34px 20px;text-align:center;color:var(--mut);cursor:pointer;font-size:1.02rem;transition:border-color .2s}
  .dropzone.survol,.dropzone:hover{border-color:var(--acc);color:var(--txt)}
  /* Aide */
  .aide details{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin:8px 0}
  .aide summary{cursor:pointer;font-weight:600;font-size:1rem}
  .aide details p,.aide details ol,.aide details ul{font-size:.95rem}
  .aide li{margin:6px 0}
</style>

<!-- ==== FM Theme Hook — portail « Formation Musicale » (thème optionnel, app 100% autonome/offline) ==== -->
<script>
(function(){
  try{
    var qs = new URLSearchParams(location.search);
    var t  = qs.get('theme');
    if (t==='clair' || t==='sombre'){ try{ localStorage.setItem('fm-theme', t); }catch(e){} }
    else { try{ t = localStorage.getItem('fm-theme'); }catch(e){ t=null; } }
    if (t==='clair' || t==='sombre'){ document.documentElement.setAttribute('data-fm-theme', t); }
    var tu = qs.get('themeUrl');   // thème externe optionnel : ?themeUrl=/portal-theme-tokens.css
    if (tu){ var l=document.createElement('link'); l.rel='stylesheet'; l.href=tu; document.head.appendChild(l); }
  }catch(e){ /* repli silencieux : l'app garde ses valeurs par défaut */ }
})();
</script>
<style>
  /* Valeurs PAR DÉFAUT = look actuel de Jam Maker + (sombre). Sans thème fourni, rien ne change. */
  :root{
    --fm-bg:#14141c; --fm-panel:#1e1e2a; --fm-panel-2:#262636; --fm-line:#34344a;

    --fm-bg:#efe7d8; --fm-panel:#f7f1e6; --fm-panel-2:#f0e7d6;

  }

    --fm-bg:#0e0e10; --fm-panel:#17151a; --fm-panel-2:#1c1a1f;

    --fm-accent:#c9a24b; --fm-accent-2:#7a6a3a; --fm-accent-ink:#0e0e10;
    --fm-staff:rgba(201,162,75,.05);
    --fm-font-ui:'Work Sans', system-ui, sans-serif;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
"use strict";

/* ============================================================
   CONFIG — laisser vide pour le mode démo (localStorage).
   Pour brancher Supabase : renseigner l'URL du projet et la
   clé « anon » (Settings → API), après avoir exécuté schema.sql.
   ============================================================ */
const CONFIG = {
  SUPABASE_URL: "",
  SUPABASE_ANON_KEY: ""
};
const MODE_DEMO = !CONFIG.SUPABASE_URL;

const INSTRUMENTS = ["chant","guitare","basse","batterie","clavier","cuivres","violon","percussions","harmonica","autre"];
const STATUTS_COMP = ["apprentissage","jouable","maitrise"];
const ORDRE_STATUT = {apprentissage:0, jouable:1, maitrise:2};
const LIB_STATUT = {apprentissage:"en apprentissage", jouable:"jouable", maitrise:"maîtrisé"};
const LIB_BESOIN = {indispensable:"indispensable", souhaitable:"souhaitable", bonus:"bonus"};

/* ---------- Icônes & badges d'instruments ---------- */
const ICONES = {
  chant:["M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z","M19 10v1a7 7 0 0 1-14 0v-1","M12 18v4","M8 22h8"],
  guitare:["M12 12 21 3","M17.5 3.5 20.5 6.5","M12.8 11.2a5.2 5.2 0 1 0-7.3 7.3 5.2 5.2 0 0 0 7.3-7.3z","M8.5 15.5h.01"],
  basse:["M9.5 14.5 21 3","M18 3.5 20.5 6","M9.8 14.2a4 4 0 1 0-6 6 4 4 0 0 0 6-6z","M6.5 17.5h.01"],
  batterie:["M4 9c0-1.7 3.6-3 8-3s8 1.3 8 3-3.6 3-8 3-8-1.3-8-3z","M4 9v7c0 1.7 3.6 3 8 3s8-1.3 8-3V9","M8 2l3 4","M16 2l-3 4"],
  clavier:["M3 7h18v10H3z","M7.5 7v6","M12 7v6","M16.5 7v6"],
  cuivres:["M3 9v7","M3 12h8","M11 8v9c3.5-1 7-2 10-2V9c-3 0-6.5 0-10-1z","M6 12V9.5","M8.5 12V9.5"],
  violon:["M12 10V3","M10 3h4","M12 21c-2.8 0-5-2.2-5-5.2S9.2 10 12 10s5 2.8 5 5.8-2.2 5.2-5 5.2z","M10.5 14v4","M13.5 14v4"],
  percussions:["M3 10h8v6.5c0 1.2-1.8 2.2-4 2.2s-4-1-4-2.2z","M13 12h8v4.5c0 1.2-1.8 2.2-4 2.2s-4-1-4-2.2z","M3 10c0 1 1.8 1.8 4 1.8s4-.8 4-1.8","M13 12c0 .9 1.8 1.6 4 1.6s4-.7 4-1.6"],
  harmonica:["M3 9h18v6H3z","M6 12h.01","M9.5 12h.01","M13 12h.01","M16.5 12h.01"],
  autre:["M9 18V5l11-2v13","M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0z","M20 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"]
};
const TEINTES = {chant:"#e07090",guitare:"#f0a832",basse:"#c88a3c",batterie:"#e06060",clavier:"#6aa0e0",
  cuivres:"#e8c84a",violon:"#a888e8",percussions:"#d0785a",harmonica:"#5ec8c8",autre:"#9a9ab0"};
const ARTICLE = {chant:"du chant",guitare:"de la guitare",basse:"de la basse",batterie:"de la batterie",
  clavier:"du clavier",cuivres:"des cuivres",violon:"du violon",percussions:"des percussions",
  harmonica:"de l'harmonica",autre:"d'un autre instrument"};

function icone(instr,taille=15){
  const traits = ICONES[instr]||ICONES.autre;
  return `<svg viewBox="0 0 24 24" width="${taille}" height="${taille}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${traits.map(d=>`<path d="${d}"/>`).join("")}</svg>`;
}
function badgeInstr(instr, opts={}){
  const t = TEINTES[instr]||TEINTES.autre;
  return `<span class="badge${opts.gros?" gros":""}" style="border-color:${t}66"><span class="ico" style="background:${t}26;color:${t}">${icone(instr,opts.gros?17:14)}</span>${instr}${opts.texte||""}</span>`;
}

/* ---------- Données de démonstration ---------- */
function donneesDemo(){
  const m1={id:"m1",pseudo:"Jean"}, m2={id:"m2",pseudo:"Sophie"}, m3={id:"m3",pseudo:"Marc"}, m4={id:"m4",pseudo:"Léa"};
  const c1={id:"c1",titre:"Hotel California",artiste:"Eagles",tonalite:"Bm",tempo:75,structure:"intro / couplets / solo / final",lien:""};
  const c2={id:"c2",titre:"Superstition",artiste:"Stevie Wonder",tonalite:"Ebm",tempo:100,structure:"riff / couplets / pont",lien:""};
  const p1={id:"p1",chanson_id:"c1",statut:"repetition",cree_par:"m1",cree_le:new Date().toISOString()};
  return {
    membres:[m1,m2,m3,m4],
    chansons:[c1,c2],
    competences:[
      {id:"k1",membre_id:"m1",chanson_id:null,instrument:"guitare",statut:"maitrise"},
      {id:"k2",membre_id:"m1",chanson_id:"c1",instrument:"guitare",statut:"maitrise"},
      {id:"k3",membre_id:"m2",chanson_id:null,instrument:"chant",statut:"maitrise"},
      {id:"k4",membre_id:"m2",chanson_id:"c1",instrument:"chant",statut:"jouable"},
      {id:"k5",membre_id:"m3",chanson_id:null,instrument:"basse",statut:"jouable"},
      {id:"k6",membre_id:"m3",chanson_id:"c1",instrument:"basse",statut:"jouable"},
      {id:"k7",membre_id:"m4",chanson_id:null,instrument:"batterie",statut:"jouable"},
      {id:"k8",membre_id:"m4",chanson_id:"c2",instrument:"batterie",statut:"jouable"}
    ],
    projets:[p1],
    slots:[
      {id:"s1",projet_id:"p1",instrument:"guitare",besoin:"indispensable",membre_id:"m1",invitation:"accepte"},
      {id:"s2",projet_id:"p1",instrument:"chant",besoin:"indispensable",membre_id:"m2",invitation:"accepte"},
      {id:"s3",projet_id:"p1",instrument:"basse",besoin:"indispensable",membre_id:"m3",invitation:"en_attente"},
      {id:"s4",projet_id:"p1",instrument:"cuivres",besoin:"bonus",membre_id:null,invitation:null},
      {id:"s5",projet_id:"p1",instrument:"batterie",besoin:"souhaitable",membre_id:null,invitation:null}
    ],
    partitions:[],
    repetitions:[{id:"r1",projet_id:"p1",date:new Date(Date.now()+7*864e5).toISOString(),lieu:"local répète",notes:""}],
    confirmations:[],
    evenements:[{id:"e1",nom:"Jam de rentrée",date:new Date(Date.now()+30*864e5).toISOString(),lieu:"Café du Pont",cree_par:"m1",cree_le:new Date().toISOString()}],
    participations:[{id:"pa1",evenement_id:"e1",membre_id:"m1",statut:"confirme"},{id:"pa2",evenement_id:"e1",membre_id:"m2",statut:"confirme"}],
    playlist_items:[]
  };
}

/* ============================================================
   COUCHE DONNÉES — deux implémentations, même interface :
   load() → remplit S ; insert/update/remove(table, ...) ;
   uploadPartition(projetId, instrument, file) ; dataPartition(fichier).
   ============================================================ */
let S = null;            // état courant (cache de toutes les tables)
let USER = null;         // membre connecté {id, pseudo}
const CLE_DEMO = "jammaker.demo.v2";
const CLE_USER = "jammaker.demo.user";

const DemoAPI = {
  async load(){
    const brut = localStorage.getItem(CLE_DEMO);
    S = brut ? JSON.parse(brut) : donneesDemo();
    this._save();
    const uid = localStorage.getItem(CLE_USER);
    USER = S.membres.find(m=>m.id===uid) || S.membres[0];
    localStorage.setItem(CLE_USER, USER.id);
  },
  _save(){ localStorage.setItem(CLE_DEMO, JSON.stringify(S)); },
  async insert(table,row){ row.id = row.id || crypto.randomUUID(); S[table].push(row); this._save(); return row; },
  async update(table,id,patch){ const r=S[table].find(x=>x.id===id); if(r) Object.assign(r,patch); this._save(); },
  async remove(table,id){ S[table]=S[table].filter(x=>x.id!==id); this._save(); },
  async uploadPartition(projetId, instrument, file){
    if(file.size > 2*1024*1024){ alert("Mode démo : fichier limité à 2 Mo. Branchez Supabase pour de vrais uploads."); return null; }
    const dataUrl = await new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(file); });
    const existantes = S.partitions.filter(p=>p.projet_id===projetId && p.instrument===instrument);
    return this.insert("partitions",{projet_id:projetId,instrument,fichier:file.name,version:existantes.length+1,
      uploade_par:USER.id,uploade_le:new Date().toISOString(),dataUrl});
  },
  async dataPartition(part){ return part.dataUrl || null; },
  async setUser(id){ localStorage.setItem(CLE_USER,id); await this.load(); }
};

const SupaAPI = {
  sb:null,
  async init(){
    await new Promise((res,rej)=>{ const s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    this.sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  },
  async load(){
    const {data:{user}} = await this.sb.auth.getUser();
    if(!user){ USER=null; S=null; return; }
    S = {};
    for(const t of ["membres","chansons","competences","projets","slots","partitions","repetitions","confirmations","evenements","participations","playlist_items"]){
      const {data,error} = await this.sb.from(t).select("*");
      if(error) throw error;
      S[t] = data||[];
    }
    USER = S.membres.find(m=>m.id===user.id);
    if(!USER){ // premier passage : créer le profil
      const pseudo = prompt("Bienvenue ! Choisissez un pseudo :") || user.email.split("@")[0];
      const {data} = await this.sb.from("membres").insert({id:user.id,pseudo}).select().single();
      USER=data; S.membres.push(data);
    }
  },
  async connexion(email){
    const {error} = await this.sb.auth.signInWithOtp({email});
    alert(error ? "Erreur : "+error.message : "Lien de connexion envoyé à "+email+". Ouvrez votre boîte mail.");
  },
  async deconnexion(){ await this.sb.auth.signOut(); location.reload(); },
  async insert(table,row){ delete row.dataUrl; const {data,error}=await this.sb.from(table).insert(row).select().single();
    if(error){alert("Erreur : "+error.message); throw error;} S[table].push(data); return data; },
  async update(table,id,patch){ const {error}=await this.sb.from(table).update(patch).eq("id",id);
    if(error){alert("Erreur : "+error.message); throw error;} const r=S[table].find(x=>x.id===id); if(r)Object.assign(r,patch); },
  async remove(table,id){ const {error}=await this.sb.from(table).delete().eq("id",id);
    if(error){alert("Erreur : "+error.message); throw error;} S[table]=S[table].filter(x=>x.id!==id); },
  async uploadPartition(projetId, instrument, file){
    const chemin = `${projetId}/${instrument}/${Date.now()}_${file.name}`;
    const {error} = await this.sb.storage.from("partitions").upload(chemin,file);
    if(error){alert("Erreur upload : "+error.message); return null;}
    const existantes = S.partitions.filter(p=>p.projet_id===projetId && p.instrument===instrument);
    return this.insert("partitions",{projet_id:projetId,instrument,fichier:chemin,version:existantes.length+1,uploade_par:USER.id});
  },
  async dataPartition(part){
    const {data,error} = await this.sb.storage.from("partitions").download(part.fichier);
    if(error) return null;
    return await data.arrayBuffer();
  }
};

const API = MODE_DEMO ? DemoAPI : SupaAPI;

/* ============================================================
   LOGIQUE MÉTIER
   ============================================================ */
const parId = (table,id) => (S[table]||[]).find(x=>x.id===id);
const chanson = id => parId("chansons",id);
const membre  = id => parId("membres",id);
const pseudo  = id => (membre(id)||{pseudo:"?"}).pseudo;

// Badges d'un membre = instruments distincts de ses compétences
function badges(mid){
  return [...new Set(S.competences.filter(k=>k.membre_id===mid).map(k=>k.instrument))];
}
// Le membre sait-il jouer (chanson, instrument) au niveau « jouable » ou plus ?
function saitJouer(mid, chansonId, instrument){
  return S.competences.some(k=>k.membre_id===mid && k.chanson_id===chansonId
    && k.instrument===instrument && ORDRE_STATUT[k.statut]>=1);
}
// Dernier verdict d'un slot (répétitions)
function dernierVerdict(slotId){
  const c = S.confirmations.filter(c=>c.slot_id===slotId)
    .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  return c ? c.verdict : null;
}
// Complétude = % de slots indispensables pourvus ET dont le dernier verdict est « ça tient »
function completude(projet){
  const ind = S.slots.filter(s=>s.projet_id===projet.id && s.besoin==="indispensable");
  if(!ind.length) return 0;
  const ok = ind.filter(s=>s.membre_id && s.invitation==="accepte" && dernierVerdict(s.id)==="ca_tient");
  return Math.round(100*ok.length/ind.length);
}
// Statut affiché d'un projet (dérivé)
function statutDerive(projet){
  if(projet.statut==="joue") return "joué";
  const ind = S.slots.filter(s=>s.projet_id===projet.id && s.besoin==="indispensable");
  if(!ind.length) return "brouillon";
  if(ind.some(s=>!s.membre_id || s.invitation!=="accepte")) return "recrutement";
  return completude(projet)===100 ? "jouable" : "en répétition";
}
// Membres confirmés à un événement
function presents(evenementId){
  return S.participations.filter(p=>p.evenement_id===evenementId && p.statut==="confirme").map(p=>p.membre_id);
}
/* Jouabilité d'un projet à un événement donné.
   Pour chaque slot indispensable :
   - titulaire présent → couvert (origine)
   - sinon un présent qui « sait jouer » (chanson, instrument) → couvert (doublure)
   - sinon → manquant
   Retour : {niveau:'origine'|'doublure'|'non', doublures:[{instrument,membre_id}], manquants:[instrument]} */
function jouabilite(evenementId, projet){
  const la = presents(evenementId);
  const ch = projet.chanson_id;
  const ind = S.slots.filter(s=>s.projet_id===projet.id && s.besoin==="indispensable");
  const doublures=[], manquants=[];
  let origine = true;
  for(const s of ind){
    if(s.membre_id && s.invitation==="accepte" && la.includes(s.membre_id)) continue;
    origine = false;
    const dbl = la.find(mid=>saitJouer(mid,ch,s.instrument) && mid!==s.membre_id);
    if(dbl) doublures.push({instrument:s.instrument,membre_id:dbl});
    else manquants.push(s.instrument);
  }
  if(!ind.length) return {niveau:"non",doublures,manquants:["aucun slot défini"]};
  return {niveau: manquants.length ? "non" : (origine ? "origine" : "doublure"), doublures, manquants};
}
// Qui pourrait couvrir un slot (suggestion de doublure / invitation)
function candidats(projet, instrument){
  return S.membres.filter(m=>saitJouer(m.id,projet.chanson_id,instrument)
    || S.competences.some(k=>k.membre_id===m.id && !k.chanson_id && k.instrument===instrument));
}

/* ---------- Conseils contextualisés ---------- */
// Sur un projet : qui inviter pour les slots vacants ?
function conseilsProjet(p){
  const out = [];
  for(const s of S.slots.filter(s=>s.projet_id===p.id && (!s.membre_id || s.invitation==="refuse"))){
    for(const m of candidats(p, s.instrument)){
      const connait = saitJouer(m.id, p.chanson_id, s.instrument);
      out.push({slotId:s.id, membreId:m.id,
        texte:`<b>${esc(m.pseudo)}</b> joue ${ARTICLE[s.instrument]||s.instrument}${connait?" et connaît déjà ce morceau":""} — ${connait?"la recrue idéale":"ce serait bien"} pour ce morceau.`});
    }
  }
  return out;
}
// Sur ma page : quels projets cherchent mes instruments ?
function conseilsPourMoi(){
  const mesInstr = badges(USER.id);
  const out = [];
  for(const p of S.projets.filter(p=>p.statut!=="joue")){
    if(S.slots.some(s=>s.projet_id===p.id && s.membre_id===USER.id && s.invitation!=="refuse")) continue;
    for(const s of S.slots.filter(s=>s.projet_id===p.id && !s.membre_id && mesInstr.includes(s.instrument))){
      const c = chanson(p.chanson_id);
      out.push({projetId:p.id, texte:`Il manque quelqu'un ${ARTICLE[s.instrument]||s.instrument} sur « <b>${esc(c.titre)}</b> » — et tu joues ${ARTICLE[s.instrument]||s.instrument} !`});
    }
  }
  return out;
}
// Sur un événement : quelle présence débloquerait un morceau ?
function conseilsEvenement(evtId){
  const la = presents(evtId), out = [], vus = new Set();
  for(const p of S.projets){
    const j = jouabilite(evtId, p);
    if(j.niveau!=="non") continue;
    const c = chanson(p.chanson_id);
    for(const instr of j.manquants){
      for(const m of S.membres.filter(m=>!la.includes(m.id) && saitJouer(m.id,p.chanson_id,instr))){
        const cle = m.id+p.id;
        if(vus.has(cle)) continue; vus.add(cle);
        out.push({texte:`Si <b>${esc(m.pseudo)}</b> (${instr}) confirme sa présence, « <b>${esc(c.titre)}</b> » devient jouable.`});
      }
    }
  }
  return out;
}

let GUIDE = null;
const CLE_GUIDE = "jammaker.guide.vu";

  GUIDE = {etape:1, but:null, chansonId:"", titre:"", artiste:"",
    instruments:new Set(badges(USER.id)), besoins:new Set(["chant","guitare","basse","batterie"]),
    invites:{}, nom:"", date:"", lieu:"", fait:[], lienFin:"#/moi"};

             <button class="mini">C'est mon prénom</button></form>`)

  } else if(g.etape===2){
    html = dots(2)+`<h2>Que sais-tu faire ?</h2>
      <p>Touche les instruments que tu joues — même un peu.</p>
      <div class="choix-instr">${INSTRUMENTS.map(i=>
        `<button class="${g.instruments.has(i)?"on":""}" onclick="guideToggle('instruments','${i}')">${icone(i,17)} ${i}</button>`).join("")}</div>
      <p class="mut">Ils deviendront tes badges, visibles par le groupe.</p>`+nav(1,3);

  } else if(g.etape===3){
    html = dots(3)+`<h2>Que veux-tu faire ?</h2>

      <button class="gbtn" onclick="finGuide();location.hash='#/aide'">&#128214; Juste comprendre l'appli<small>Ouvrir le mode d'emploi</small></button>`+nav(2,null);

  } else if(g.etape===4 && g.but==="monter"){
    html = dots(4)+`<h2>Quel morceau ?</h2>
      <p>Choisis dans le répertoire&hellip;</p>
      <select id="g-chanson" style="font-size:1rem;max-width:100%"><option value="">— choisir —</option>
        ${S.chansons.map(c=>`<option value="${c.id}" ${c.id===g.chansonId?"selected":""}>${esc(c.titre)}${c.artiste?" — "+esc(c.artiste):""}</option>`).join("")}</select>
      <p>&hellip; ou ajoute-le :</p>
      <form class="bloc" style="justify-content:center">
        <input id="g-titre" placeholder="Titre" value="${esc(g.titre)}">
        <input id="g-artiste" placeholder="Artiste" value="${esc(g.artiste)}"></form>`+nav(3,5);

  } else if(g.etape===4 && g.but==="rejoindre"){
    const offres = [];
    for(const p of S.projets.filter(p=>p.statut!=="joue"))
      for(const s of S.slots.filter(s=>s.projet_id===p.id && !s.membre_id))
        offres.push({s, p, moi:g.instruments.has(s.instrument)});
    offres.sort((a,b)=>(b.moi?1:0)-(a.moi?1:0));
    html = dots(4)+`<h2>Avec qui ?</h2>
      <p>Voici les morceaux qui cherchent du monde :</p>`
      +(offres.map(o=>{const c=chanson(o.p.chanson_id);
        return `<button class="gbtn" onclick="guideRejoindre('${o.s.id}')">${icone(o.s.instrument,18)} « ${esc(c.titre)} » cherche ${ARTICLE[o.s.instrument]||o.s.instrument}

        ||`<p class="vide">Personne ne cherche de musicien pour l'instant. Tu peux monter ton propre morceau !</p>`)
      +nav(3,null);

  } else if(g.etape===4 && g.but==="organiser"){
    html = dots(4)+`<h2>Ta jam</h2>
      <p>Donne-lui un nom :</p>
      <form class="bloc" style="justify-content:center">
        <input id="g-nom" placeholder="ex. Jam de rentrée" value="${esc(g.nom)}" style="min-width:220px"></form>`+nav(3,6);

  } else if(g.etape===5){ // monter : avec qui ?
    const pseudoProjet = {chanson_id:g.chansonId||null};
    html = dots(4)+`<h2>Avec qui ?</h2>
      <p>De quels instruments as-tu besoin ?</p>
      <div class="choix-instr">${INSTRUMENTS.map(i=>
        `<button class="${g.besoins.has(i)?"on":""}" onclick="guideToggle('besoins','${i}')">${icone(i,17)} ${i}</button>`).join("")}</div>
      <div style="text-align:left">${[...g.besoins].map(i=>{
        const cands = candidats(pseudoProjet,i);
        return cands.length?`<p style="margin:8px 0">${badgeInstr(i)} :
          ${cands.map(m=>`<button class="mini ${g.invites[i]===m.id?"prim":""}" onclick="guideInviter('${i}','${m.id}')">${m.id===USER.id?"moi ("+esc(m.pseudo)+")":esc(m.pseudo)}</button>`).join(" ")}</p>`:"";
      }).join("")}</div>
      <p class="mut">Clique un prénom pour l'inviter (ou toi-même pour prendre la place). Tu pourras compléter plus tard.</p>`+nav(4,6);

  } else if(g.etape===6){ // quand ?
    html = dots(5)+`<h2>Quand ?</h2>
      <p>${g.but==="monter"?"Première répétition — pas encore de date ? Laisse vide.":"Date de la jam :"}</p>
      <form class="bloc" style="justify-content:center">

    const ch = g.chansonId ? chanson(g.chansonId) : null;
    const lignes = g.but==="monter"
      ? [`&#127925; Morceau : <b>${esc(ch?ch.titre:g.titre)}</b>`,
         `&#129309; Besoins : ${[...g.besoins].map(i=>badgeInstr(i)).join(" ")}`,
         Object.keys(g.invites).length?`&#9993;&#65039; Invitations : ${Object.entries(g.invites).map(([i,m])=>esc(pseudo(m))+" ("+i+")").join(", ")}`:"",
         g.date?`&#128197; Première répète : ${dateFr(g.date)}${g.lieu?" — "+esc(g.lieu):""}`:""]
      : [`&#127914; Jam : <b>${esc(g.nom)}</b>`,
         `&#128197; ${g.date?dateFr(g.date):"?"}${g.lieu?" — "+esc(g.lieu):""}`,
         `&#10004; Ta présence sera confirmée d'office`];
    html = dots(5)+`<h2>On y va ?</h2>
      <div class="carte" style="text-align:left">${lignes.filter(Boolean).map(l=>`<p>${l}</p>`).join("")}</div>

      +nav(6,null);

  } else if(g.etape==="fin"){
    html = `<h2>&#127881; C'est fait !</h2>`
      +g.fait.map(f=>`<p>&#10004; ${f}</p>`).join("")
      +`<button class="gbtn" style="text-align:center" onclick="const h='${g.lienFin}';finGuide();location.hash=h">Voir le résultat</button>

  $app.innerHTML = `<div class="guide">${html}
    <p style="margin-top:26px"><a href="#/moi" onclick="finGuide()" style="color:var(--mut)">Quitter le mode guidé</a></p></div>`;

async function guideVa(n){
  const g = GUIDE;
  if(g.etape===2 && n>2){ // enregistrer les badges cochés
    for(const i of g.instruments) if(!badges(USER.id).includes(i))
      await API.insert("competences",{membre_id:USER.id,chanson_id:null,instrument:i,statut:"jouable"});
  }
  if(g.etape===4 && g.but==="monter" && n===5){
    g.chansonId = document.getElementById("g-chanson").value;
    g.titre = document.getElementById("g-titre").value.trim();
    g.artiste = document.getElementById("g-artiste").value.trim();
    if(!g.chansonId && !g.titre){ alert("Choisis une chanson ou tape un titre."); return; }
    if(g.chansonId){ g.titre=""; g.artiste=""; }
  }
  if(g.etape===4 && g.but==="organiser" && n===6){
    g.nom = document.getElementById("g-nom").value.trim();
    if(!g.nom){ alert("Donne un nom à ta jam."); return; }
  }
  if(g.etape===6 && n===7){
    g.date = document.getElementById("g-date").value;
    g.lieu = document.getElementById("g-lieu").value.trim();
    if(g.but==="organiser" && !g.date){ alert("Une jam a besoin d'une date !"); return; }
  }
  g.etape = n;
  vueGuide();
}
async function guideChoisirMembre(id){ await DemoAPI.setUser(id); GUIDE.instruments=new Set(badges(USER.id)); renderUserZone(); vueGuide(); }
async function guideNouveauMembre(){
  const p = document.getElementById("g-pseudo").value.trim(); if(!p) return;
  const m = await API.insert("membres",{pseudo:p});
  await DemoAPI.setUser(m.id); GUIDE.instruments=new Set(); renderUserZone(); vueGuide();
}
async function guideRenommer(){
  const p = document.getElementById("g-pseudo").value.trim(); if(!p) return;
  await API.update("membres",USER.id,{pseudo:p}); USER.pseudo=p; renderUserZone(); vueGuide();
}
function guideToggle(champ,i){ const s=GUIDE[champ]; s.has(i)?s.delete(i):s.add(i); if(champ==="besoins"&&!s.has(i)) delete GUIDE.invites[i]; vueGuide(); }
function guideBut(but){ GUIDE.but=but; GUIDE.etape=4; vueGuide(); }
function guideInviter(instr,mid){ GUIDE.invites[instr] = GUIDE.invites[instr]===mid ? undefined : mid; if(!GUIDE.invites[instr]) delete GUIDE.invites[instr]; vueGuide(); }
async function guideRejoindre(slotId){
  const g=GUIDE, s=parId("slots",slotId), p=parId("projets",s.projet_id), c=chanson(p.chanson_id);
  await API.update("slots",slotId,{membre_id:USER.id,invitation:"accepte"});
  if(!badges(USER.id).includes(s.instrument))
    await API.insert("competences",{membre_id:USER.id,chanson_id:null,instrument:s.instrument,statut:"jouable"});
  g.fait=[`Tu tiens désormais ${ARTICLE[s.instrument]||s.instrument} sur « ${esc(c.titre)} »`];
  g.lienFin="#/projet/"+p.id; g.etape="fin";
  vueGuide();
}
async function guideTerminer(){
  const g = GUIDE; g.fait=[];
  if(g.but==="monter"){
    let ch = g.chansonId ? chanson(g.chansonId) : null;
    if(!ch){
      ch = await API.insert("chansons",{titre:g.titre,artiste:g.artiste,tonalite:"",tempo:null,lien:"",cree_par:USER.id,cree_le:new Date().toISOString()});
      g.fait.push(`Chanson « ${esc(ch.titre)} » ajoutée au répertoire`);
    }
    const p = await API.insert("projets",{chanson_id:ch.id,statut:"brouillon",cree_par:USER.id,cree_le:new Date().toISOString()});
    g.fait.push(`Projet « ${esc(ch.titre)} » créé — c'est toi qui le pilotes`);
    for(const i of g.besoins){
      const mid = g.invites[i]||null;
      await API.insert("slots",{projet_id:p.id,instrument:i,besoin:"indispensable",
        membre_id:mid, invitation:mid?(mid===USER.id?"accepte":"en_attente"):null});
    }
    const inv = Object.entries(g.invites).filter(([,m])=>m && m!==USER.id);
    if(inv.length) g.fait.push(`Invitations envoyées : ${inv.map(([i,m])=>esc(pseudo(m))+" ("+i+")").join(", ")}`);
    if(g.date){
      await API.insert("repetitions",{projet_id:p.id,date:new Date(g.date).toISOString(),lieu:g.lieu,notes:""});
      g.fait.push(`Première répétition : ${dateFr(g.date)}`);
    }
    g.lienFin = "#/projet/"+p.id;
  } else if(g.but==="organiser"){
    const e = await API.insert("evenements",{nom:g.nom,date:new Date(g.date).toISOString(),lieu:g.lieu,cree_par:USER.id,cree_le:new Date().toISOString()});
    await API.insert("participations",{evenement_id:e.id,membre_id:USER.id,statut:"confirme"});
    g.fait.push(`Jam « ${esc(g.nom)} » créée pour le ${dateFr(g.date)}`,"Ta présence est confirmée");
    g.lienFin = "#/evenement/"+e.id;
  }
  g.etape="fin";
  vueGuide();
}

/* ============================================================
   PARTITIONS — dépôt centralisé des PDF (glisser-déposer)
   ============================================================ */
let FICHIERS_EN_ATTENTE = [];

function devinerCible(nomFichier){
  const bas = nomFichier.toLowerCase();
  const p = S.projets.find(p=>{const c=chanson(p.chanson_id);
    return c && c.titre.toLowerCase().split(/\s+/).some(mot=>mot.length>3 && bas.includes(mot));});
  const i = INSTRUMENTS.find(i=>bas.includes(i));
  return {projetId: p?p.id:(S.projets[0]?S.projets[0].id:""), instrument: i||"autre"};
}
function ajouterFichiers(files){
  for(const f of files){
    if(f.type!=="application/pdf" && !f.name.toLowerCase().endsWith(".pdf")){ alert(f.name+" : seuls les PDF sont acceptés."); continue; }
    FICHIERS_EN_ATTENTE.push({file:f, ...devinerCible(f.name)});
  }
  vuePartitions();
}
function deposerFichiers(ev){ ev.preventDefault(); ev.currentTarget.classList.remove("survol"); ajouterFichiers(ev.dataTransfer.files); }
async function enregistrerFichier(ix){
  const f = FICHIERS_EN_ATTENTE[ix];
  const projetId = document.getElementById("fx-p-"+ix).value;
  const instrument = document.getElementById("fx-i-"+ix).value;
  if(!projetId){ alert("Il faut d'abord un projet : Répertoire → « Monter un projet »."); return; }
  const res = await API.uploadPartition(projetId, instrument, f.file);
  if(res!==null) FICHIERS_EN_ATTENTE.splice(ix,1);
  vuePartitions();
}
function retirerFichier(ix){ FICHIERS_EN_ATTENTE.splice(ix,1); vuePartitions(); }

function vuePartitions(){
  $app.innerHTML = `<h2>Partitions (PDF)</h2>
  <div class="carte">
    <div class="dropzone" onclick="document.getElementById('dz-input').click()"
      ondragover="event.preventDefault();this.classList.add('survol')"
      ondragleave="this.classList.remove('survol')"
      ondrop="deposerFichiers(event)">
      &#128196; <b>Glisse tes PDF ici</b><br><span class="mut">ou clique pour choisir des fichiers — plusieurs à la fois si tu veux</span>
    </div>
    <input id="dz-input" type="file" accept="application/pdf" multiple hidden onchange="ajouterFichiers(this.files);this.value=''">
    ${FICHIERS_EN_ATTENTE.map((f,ix)=>`<div class="ligne" style="margin-top:10px">
      <span>&#128196; ${esc(f.file.name)}</span>
      <select id="fx-p-${ix}">${S.projets.map(p=>{const c=chanson(p.chanson_id);
        return `<option value="${p.id}" ${p.id===f.projetId?"selected":""}>${esc(c?c.titre:"?")}</option>`;}).join("")||'<option value="">aucun projet</option>'}</select>
      <select id="fx-i-${ix}">${optInstruments(f.instrument)}</select>
      <button class="mini prim" onclick="enregistrerFichier(${ix})">Enregistrer</button>
      <button class="mini" onclick="retirerFichier(${ix})">&#10005;</button></div>`).join("")}
    ${FICHIERS_EN_ATTENTE.length?`<p class="mut">Vérifie le morceau et l'instrument devinés, puis « Enregistrer ».</p>`:""}
  </div>
  <h3>Toutes les partitions du groupe</h3>
  ${S.projets.map(p=>{
    const c = chanson(p.chanson_id);
    const parts = S.partitions.filter(pt=>pt.projet_id===p.id).sort((a,b)=>a.instrument.localeCompare(b.instrument)||b.version-a.version);
    if(!parts.length) return "";
    return `<div class="carte"><b>${esc(c?c.titre:"?")}</b>
      ${parts.map(pt=>`<div class="ligne" style="margin:4px 0">${badgeInstr(pt.instrument)}
        <span>${esc(pt.fichier.split("/").pop())}</span><span class="mut">v${pt.version}</span>
        <span class="esp"></span><button class="mini" onclick="telechargerPartition('${pt.id}')">ouvrir</button></div>`).join("")}</div>`;
  }).join("")||`<p class="vide">Aucune partition pour l'instant. Dépose un premier PDF ci-dessus !</p>`}`;
}

    Tu reçois un PDF avec la liste des morceaux dans l'ordre et <b>tes</b> partitions. À imprimer ou à garder sur la tablette.</p></details>

  <details><summary>&#128218; Les mots de l'appli</summary><ul>
    <li><b>Badge</b> : un instrument que tu joues.</li>
    <li><b>Projet</b> : un morceau que le groupe est en train de monter.</li>
    <li><b>Slot</b> : une place d'instrument dans un morceau (ex. « il faut un bassiste »).</li>
    <li><b>Complétude</b> : la barre de progression d'un morceau — 100 % = tout le monde dit « ça tient ».</li>
    <li><b>Jouabilité</b> : pour une jam donnée, le morceau passe-t-il avec les gens présents ?</li>
    <li><b>Cahier de jam</b> : ton PDF personnel avec la setlist et tes partitions.</li></ul></details>

  <details><summary>&#128295; Un problème ?</summary><ul>
    <li>Un doute ? Repasse par le bouton <b>&#10024; Guidé</b> : il ne casse rien.</li>
    <li>En <b>mode démo</b>, tout est enregistré dans TON navigateur uniquement — les autres ne voient pas tes changements.</li>
    <li>Rien ne s'affiche ? Recharge la page (touche F5).</li>
    <li>Le reste : demande à la personne qui gère l'appli dans le groupe.</li></ul></details>
  </div>`;
}

}

  await API.insert("chansons",{titre:val("in-ch-titre"),artiste:val("in-ch-artiste"),
    tonalite:val("in-ch-ton"),tempo:parseInt(val("in-ch-tempo"))||null,lien:val("in-ch-lien"),
    cree_par:USER.id,cree_le:new Date().toISOString()});

}

}
async function ajouterSlot(projetId){

  await API.update("slots",slotId,{membre_id:mid,invitation:"en_attente"});

}
async function repondreInvitation(slotId,reponse){
  const patch = reponse==="accepte" ? {invitation:"accepte"} : {invitation:null,membre_id:null};
  await API.update("slots",slotId,patch);

async function ajouterRepetition(projetId){
  await API.insert("repetitions",{projet_id:projetId,date:new Date(val("in-rep-date")).toISOString(),lieu:val("in-rep-lieu"),notes:""});
  rafraichir();
}
async function confirmerRepet(repetitionId,slotId,verdict){
  await API.insert("confirmations",{repetition_id:repetitionId,slot_id:slotId,verdict,date:new Date().toISOString()});
  // « ça tient » fait aussi progresser le triplet du membre vers « jouable »
  if(verdict==="ca_tient"){
    const s=parId("slots",slotId), p=parId("projets",s.projet_id);
    const k=S.competences.find(k=>k.membre_id===s.membre_id && k.chanson_id===p.chanson_id && k.instrument===s.instrument);
    if(!k) await API.insert("competences",{membre_id:s.membre_id,chanson_id:p.chanson_id,instrument:s.instrument,statut:"jouable"});
    else if(k.statut==="apprentissage") await API.update("competences",k.id,{statut:"jouable"});
  }
  rafraichir();
}
async function uploaderPartition(projetId,instrument,input){
  if(!input.files.length) return;
  await API.uploadPartition(projetId,instrument,input.files[0]);
  rafraichir();
}
async function telechargerPartition(id){
  const part = parId("partitions",id);
  const data = await API.dataPartition(part);
  if(!data){ alert("Fichier indisponible."); return; }
  const blob = typeof data==="string" ? await (await fetch(data)).blob() : new Blob([data],{type:"application/pdf"});
  window.open(URL.createObjectURL(blob),"_blank");

  const existant = S.playlist_items.find(i=>i.evenement_id===evtId && i.projet_id===projetId);
  if(existant) await API.update("playlist_items",existant.id,{coche});
  else await API.insert("playlist_items",{evenement_id:evtId,projet_id:projetId,coche,
    ordre:S.playlist_items.filter(i=>i.evenement_id===evtId).length});
  rafraichir();
}

/* ============================================================
   CAHIER DE JAM — un PDF par participant (pdf-lib)
   Page de garde (setlist annotée) + partitions du membre
   dans l'ordre de la setlist cochée.
   ============================================================ */
function instrumentPour(evtId, projet, mid){
  const slot = S.slots.filter(s=>s.projet_id===projet.id && s.membre_id===mid && s.invitation==="accepte")[0];
  if(slot) return slot.instrument;
  const d = jouabilite(evtId,projet).doublures.find(d=>d.membre_id===mid);
  return d ? d.instrument : null;
}

async function genererCahier(evtId, mid){
  const evt = parId("evenements",evtId);
  const setlist = S.playlist_items.filter(i=>i.evenement_id===evtId && i.coche)
    .sort((a,b)=>a.ordre-b.ordre).map(i=>parId("projets",i.projet_id)).filter(Boolean);
  if(!setlist.length){ alert("Aucun morceau coché dans la playlist."); return; }

  const {PDFDocument, StandardFonts, rgb} = PDFLib;
  const doc = await PDFDocument.create();
  const gras = await doc.embedFont(StandardFonts.HelveticaBold);
  const normal = await doc.embedFont(StandardFonts.Helvetica);

  // --- Page de garde ---
  const page = doc.addPage([595,842]); // A4
  let y = 770;
  page.drawText("Cahier de jam", {x:60,y,size:28,font:gras,color:rgb(0.94,0.66,0.2)}); y-=34;
  page.drawText(pseudo(mid), {x:60,y,size:20,font:gras}); y-=26;
  page.drawText(`${evt.nom} — ${new Date(evt.date).toLocaleDateString("fr-BE")} — ${evt.lieu||""}`,
    {x:60,y,size:12,font:normal,color:rgb(.45,.45,.5)}); y-=40;
  page.drawText("Setlist", {x:60,y,size:14,font:gras}); y-=22;
  setlist.forEach((p,i)=>{
    const c = chanson(p.chanson_id);
    const instr = instrumentPour(evtId,p,mid);
    const infos = [c.tonalite, c.tempo?c.tempo+" bpm":null].filter(Boolean).join(" · ");
    page.drawText(`${i+1}. ${c.titre}${c.artiste?" — "+c.artiste:""}`, {x:70,y,size:12,font:gras}); y-=15;
    page.drawText(`    ${infos}${infos&&instr?"  ·  ":""}${instr?("vous : "+instr):"(vous ne jouez pas sur ce morceau)"}`,
      {x:70,y,size:10,font:normal,color:rgb(.45,.45,.5)}); y-=20;
  });
  page.drawText("Généré par Jam Maker +", {x:60,y:50,size:9,font:normal,color:rgb(.6,.6,.65)});

  // --- Partitions du membre, dans l'ordre ---
  let manquantes = [];
  for(const p of setlist){
    const instr = instrumentPour(evtId,p,mid);
    if(!instr) continue;
    const parts = S.partitions.filter(pt=>pt.projet_id===p.id && pt.instrument===instr).sort((a,b)=>b.version-a.version);
    if(!parts.length){ manquantes.push(chanson(p.chanson_id).titre+" ("+instr+")"); continue; }
    const data = await API.dataPartition(parts[0]);
    if(!data){ manquantes.push(chanson(p.chanson_id).titre+" ("+instr+")"); continue; }
    try{
      const buf = typeof data==="string" ? await (await fetch(data)).arrayBuffer() : data;
      const src = await PDFDocument.load(buf);
      const pages = await doc.copyPages(src, src.getPageIndices());
      pages.forEach(pg=>doc.addPage(pg));
    }catch(err){ manquantes.push(chanson(p.chanson_id).titre+" (PDF illisible)"); }
  }
  if(manquantes.length){
    const pg = doc.addPage([595,842]);
    pg.drawText("Partitions manquantes :", {x:60,y:770,size:14,font:gras});
    manquantes.forEach((m,i)=>pg.drawText("• "+m, {x:70,y:740-18*i,size:11,font:normal}));
  }

  const bytes = await doc.save();
  const blob = new Blob([bytes],{type:"application/pdf"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `cahier_${pseudo(mid)}_${evt.nom.replace(/\W+/g,"-")}.pdf`;
  a.click();
}
